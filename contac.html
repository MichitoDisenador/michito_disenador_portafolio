<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contacto | Paola Herrera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FFD700;
            --secondary: #b0c4d3;
            --bg-dark: #0A0C10;
            --surface-dark: #161A22;
            --text-light: #F5F5F7;
            --text-muted: #A0A4B0;
            --glow-shadow: 0 0 12px rgba(255, 215, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.2);
        }

        body.light-mode {
            --bg-dark: #FEFCF5;
            --surface-dark: #FFFFFF;
            --text-light: #121212;
            --text-muted: #5A5E6E;
            --glow-shadow: 0 0 12px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            transition: background-color 0.4s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        /* HEADER FIJO (mismo estilo que index y about) */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10, 12, 16, 0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        body.light-mode .glass-header {
            background: rgba(254, 252, 245, 0.85);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .logo-area img {
            height: 70px;
            width: auto;
            display: block;
            transition: transform 0.2s;
        }
        .logo-area img:hover { transform: scale(0.97); opacity: 0.9; }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-light);
            width: 46px;
            height: 46px;
            border-radius: 100px;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .theme-toggle:hover { background: rgba(255,215,0,0.15); transform: scale(1.02); }

        main {
            padding-top: 96px;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        /* SCROLL REVEAL */
        .scroll-reveal {
            transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.7s ease;
            opacity: 0;
            transform: translateY(40px);
        }
        .scroll-reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* HERO SECTION */
        .contact-hero {
            text-align: center;
            margin: 2rem 0 2rem;
        }
        .contact-hero h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }
        .contact-hero p {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* FORMULARIO CON BORDE BRILLANTE */
        .contact-form {
            background: var(--surface-dark);
            border-radius: 24px;
            padding: 2.5rem;
            margin: 2rem auto;
            max-width: 700px;
            box-shadow: var(--glow-shadow);
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .contact-form:hover {
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.6), 0 0 28px rgba(255, 215, 0, 0.3);
            border-color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: var(--primary);
        }
        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }
        body.light-mode .form-control {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(255, 215, 0, 0.4);
            color: var(--text-light);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 212, 30, 0.2);
        }
        textarea.form-control {
            min-height: 130px;
            resize: vertical;
        }

        .submit-btn {
            background: var(--primary);
            color: #0A0C10;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 212, 30, 0.3);
            background: #ffe44d;
        }

        /* ICONOS DE REDES SOCIALES (mismo estilo que index y about) */
        .contact-social {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 3rem 0 2rem;
            flex-wrap: wrap;
        }
        .contact-social a {
            color: var(--text-light);
            font-size: 2rem;
            transition: all 0.3s ease;
            display: inline-block;
            background: rgba(255, 215, 0, 0.05);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-social a:hover {
            color: var(--primary);
            transform: translateY(-5px) scale(1.1);
            background: rgba(255, 215, 0, 0.15);
        }
        body.light-mode .contact-social a {
            background: rgba(0, 0, 0, 0.03);
        }
        body.light-mode .contact-social a:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        /* FOOTER (consistente) */
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255,215,0,0.2);
            margin-top: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 760px) {
            .glass-header { padding: 0.7rem 1rem; }
            .logo-area img { height: 52px; }
            main { padding-left: 1rem; padding-right: 1rem; }
            .contact-hero h1 { font-size: 2rem; }
            .contact-form { padding: 1.5rem; margin: 1.5rem auto; }
            .contact-social a { width: 55px; height: 55px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<header class="glass-header">
    <div class="logo-area">
        <a href="index.html">
            <img src="aessets/about/MICHITO_MEMBRETADA-04.webp" alt="Logo" onerror="this.src='https://placehold.co/200x70?text=Logo'">
        </a>
    </div>
    <button class="theme-toggle" id="darkToggle">
        <i class="fas fa-moon"></i>
    </button>
</header>

<main>
    <!-- HERO -->
    <div class="scroll-reveal">
        <div class="contact-hero">
            <h1>Hablemos de tu proyecto</h1>
            <p>¿Tienes una idea creativa? Completa el formulario y me pondré en contacto contigo en menos de 24 horas.</p>
        </div>
    </div>

    <!-- FORMULARIO CON BORDE BRILLANTE -->
    <div class="scroll-reveal">
        <div class="contact-form">
            <form id="contactForm" action="https://formspree.io/f/mnnvldov" method="POST">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" name="phone" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" class="form-control" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Enviar mensaje</button>
            </form>
        </div>
    </div>

    <!-- ICONOS SOCIALES (mismo diseño que index/about: github, dribbble, linkedin, facebook, mail) -->
    <div class="scroll-reveal">
        <div class="contact-social">
            <a href="https://github.com/MichitoDisenador" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
            <a href="https://dribbble.com/michitodisenador" target="_blank" rel="noopener"><i class="fab fa-dribbble"></i></a>
            <a href="https://www.linkedin.com/in/michito-disenador/" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i></a>
            <a href="https://www.facebook.com/michitodisenador" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i></a>
            <a href="mailto:sapichaan@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <footer class="scroll-reveal">
        <p>&copy; 2025 | Diseñado con ❤️ por <span style="color: var(--primary);">Paola Herrera Sol</span></p>
    </footer>
</main>

<script>
    // MODO NOCTURNO/CLARO (consistente con index y about)
    const toggle = document.getElementById('darkToggle');
    const body = document.body;
    const stored = localStorage.getItem('theme');
    if (stored === 'light') {
        body.classList.add('light-mode');
        if(toggle) {
            const icon = toggle.querySelector('i');
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
        }
    } else {
        body.classList.remove('light-mode');
        if(toggle) {
            const icon = toggle.querySelector('i');
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
        }
    }

    if(toggle) {
        toggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const icon = toggle.querySelector('i');
            if(body.classList.contains('light-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        });
    }

    // SCROLL REVEAL (aparición al bajar)
    const revealItems = document.querySelectorAll('.scroll-reveal');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('revealed');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.2, rootMargin: "0px 0px -20px 0px" });
    
    revealItems.forEach(el => observer.observe(el));
    
    window.addEventListener('load', () => {
        revealItems.forEach(el => {
            const rect = el.getBoundingClientRect();
            if(rect.top < window.innerHeight - 80) {
                el.classList.add('revealed');
                observer.unobserve(el);
            }
        });
    });
</script>
</body>
</html>
