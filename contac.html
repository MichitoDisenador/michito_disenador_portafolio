<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Michito Diseñador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos específicos de contacto */
        .contact-hero {
            text-align: center;
            margin: 4rem 0;
        }

        .contact-hero h1 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .contact-hero p {
            max-width: 600px;
            margin: 0 auto 2rem;
            opacity: 0.9;
        }

        .contact-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 2.5rem;
            margin: 3rem auto;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        body.light-mode .contact-form {
            background: rgba(0, 0, 0, 0.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--light-text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        body.light-mode .form-control {
            border: 2px solid rgba(0, 0, 0, 0.1);
            background: rgba(0, 0, 0, 0.03);
            color: var(--dark-text);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 212, 30, 0.2);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 212, 30, 0.3);
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 4rem 0;
        }

        .contact-card a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(175, 207, 232, 0.1);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .contact-card a:hover {
            background: rgba(255, 212, 30, 0.2);
            transform: scale(1.1) translateY(-5px);
        }

        .contact-card i {
            font-size: 1.8rem;
            color: var(--secondary);
            transition: color 0.3s;
        }

        .contact-card a:hover i {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <a href="index.html" aria-label="Volver al inicio">
                    <img src="aessets/about/MICHITO_MEMBRETADA-04.webp" alt="Logo Michito">
                </a>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <main>
            <section class="contact-hero hidden">
                <h1>Hablemos de tu proyecto</h1>
                <p>¿Tienes una idea creativa? Completa el formulario y me pondré en contacto contigo en menos de 24 horas.</p>
            </section>

            <section class="contact-form hidden delay-1">
                <form id="contactForm" action="https://formspree.io/f/mnnvldov" method="POST">
                    <div class="form-group">
                        <label for="name">Nombre completo</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Teléfono (opcional)</label>
                        <input type="tel" id="phone" name="phone" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" name="message" class="form-control" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Enviar mensaje</button>
                </form>
            </section>

            <section class="contact-info">
                <div class="contact-card hidden delay-1">
                    <a href="mailto:sapichaan@gmail.com" aria-label="Enviar correo electrónico">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
                
                <div class="contact-card hidden delay-2">
                    <a href="https://facebook.com/michitodisenador" target="_blank" rel="noopener" aria-label="Mi perfil de Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
                
                <div class="contact-card hidden delay-3">
                    <a href="https://linkedin.com/in/michito-disenador" target="_blank" rel="noopener" aria-label="Mi perfil de LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </div>
            </section>
        </main>

        <footer class="hidden delay-2">
            <p>&copy; 2025 | Diseñado con ❤️ por <span style="color: var(--primary);">Paola Herrera Sol</span></p>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
